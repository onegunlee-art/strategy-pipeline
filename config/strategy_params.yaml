# ─── 슬라이드별 세부 지시 (선택) ────────────────────────────────
slide_instructions:
  win_strategy: >
    핵심 수주 전략을 3~5개 항목으로 구체화하고,
    각 전략마다 실행 액션과 KPI를 제시하라.
  differentiators: >
    경쟁사 대비 명확한 수치·사례 기반 차별화 포인트를 강조하라.
  pricing_strategy: >
    가격 민감도가 높은 공공·대기업 환경을 고려하여
    TCO 관점의 가성비 논리를 포함하라.
